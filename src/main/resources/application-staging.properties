server.error.include-message=always
server.error.include-binding-errors=always

spring.datasource.url=${SUPABASE_POOLER_JDBC_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.validation-timeout=5000

spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=2s

workforce.cors.allowed-origins=${WORKFORCE_CORS_ALLOWED_ORIGINS:http://localhost:3000}
workforce.minimum-wage-api.url=${MINIMUM_WAGE_API_URL:}
workforce.external-api.connect-timeout-ms=1000
workforce.external-api.read-timeout-ms=3000
